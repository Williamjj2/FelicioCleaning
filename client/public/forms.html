<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netlify Form Detection</title>
</head>
<body>
    <!-- This file is for Netlify Form detection only. It is not intended for user interaction. -->
    <form name="quote-request" data-netlify="true" netlify-honeypot="bot-field" hidden>
        <input type="hidden" name="form-name" value="quote-request" />
        <input type="text" name="name" />
        <input type="email" name="email" />
        <input type="tel" name="phone" />
        <input type="text" name="service" />
        <input type="text" name="address" />
        <textarea name="message"></textarea>
        <input type="checkbox" name="smsConsent" />
        <input type="text" name="smsConsentTimestamp" />
        <input type="text" name="bot-field" />
    </form>
</body>
</html>
